<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebRTC Football - Live 1v1 with Voice & Friend Link</title>
    <style>
        * { user-select: none; }
        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: #0a2f1f;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            box-shadow: 0 0 0 4px #ffd966, 0 0 0 8px #b8860b;
            background-color: #2e7d32;
            cursor: none;
        }
        .info-panel {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            align-items: center;
            background: #1e3a2fcc;
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 12px 20px;
            color: white;
        }
        button {
            background: #ffb347;
            border: none;
            padding: 8px 18px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        button:hover { background: #ff9f1c; transform: scale(1.02); }
        select {
            background: #2c5a3b;
            color: white;
            padding: 8px 12px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
        }
        .scoreboard {
            background: #000000aa;
            padding: 5px 15px;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 4px;
        }
        .status {
            background: #111;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-family: monospace;
        }
        a {
            color: #ffd966;
            text-decoration: none;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        @media (max-width: 800px) {
            .info-panel { flex-direction: column; align-items: stretch; }
            button, select { padding: 10px; }
        }
    </style>
    <!-- PeerJS library for WebRTC -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        <div class="info-panel">
            <div class="flex-row">
                <select id="teamSelect">
                    <option value="Arsenal Red">🔴 Arsenal Red</option>
                    <option value="Manchester Blue">🔵 Manchester Blue</option>
                    <option value="Bayern Black">⚫ Bayern Black</option>
                    <option value="Paris White">⚪ Paris White</option>
                    <option value="Milan Stripe">◼️ Milan Stripe</option>
                    <option value="Ajax Green">🟢 Ajax Green</option>
                    <option value="Juventus Gold">🟡 Juventus Gold</option>
                    <option value="Real White">👑 Real White</option>
                </select>
                <button id="createGameBtn">🏆 Create Game</button>
                <button id="voiceBtn" disabled>🎙️ Start Voice</button>
                <button id="muteVoiceBtn" disabled>🔇 Mute Mic</button>
            </div>
            <div class="scoreboard">
                <span id="scoreP1">0</span>  :  <span id="scoreP2">0</span>
            </div>
            <div id="connectionStatus" class="status">⚡ Not connected</div>
        </div>
        <div id="linkArea" style="margin-top: 12px; text-align: center; font-size: 0.8rem; background: #00000088; border-radius: 40px; padding: 8px;"></div>
    </div>
</div>

<script>
    // ------------------- CANVAS GAME SETUP -------------------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Game state (will be synced)
    let gameState = {
        p1: { x: 150, y: 300, team: "Arsenal Red", color: "#dd3333" },
        p2: { x: 850, y: 300, team: "Manchester Blue", color: "#3366ff" },
        ball: { x: 500, y: 300, vx: 0, vy: 0 },
        score: { p1: 0, p2: 0 }
    };
    
    // Local input flags
    const keys = { w: false, s: false, a: false, d: false, up: false, down: false, left: false, right: false, kickP1: false, kickP2: false };
    let localPlayerId = null;   // "p1" or "p2"
    let peer = null;
    let conn = null;            // data connection
    let voiceCall = null;       // media connection for voice
    let localStream = null;
    let remoteAudio = null;
    let isVoiceActive = false;
    
    // UI elements
    const teamSelect = document.getElementById('teamSelect');
    const createBtn = document.getElementById('createGameBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const muteBtn = document.getElementById('muteVoiceBtn');
    const statusDiv = document.getElementById('connectionStatus');
    const linkArea = document.getElementById('linkArea');
    const scoreP1Span = document.getElementById('scoreP1');
    const scoreP2Span = document.getElementById('scoreP2');
    
    // Helper: update team colors
    function updateTeamColors() {
        if (localPlayerId === 'p1') {
            gameState.p1.team = teamSelect.value;
            gameState.p1.color = getTeamColor(teamSelect.value);
        } else if (localPlayerId === 'p2') {
            gameState.p2.team = teamSelect.value;
            gameState.p2.color = getTeamColor(teamSelect.value);
        }
        sendGameState();
    }
    
    function getTeamColor(teamName) {
        const map = {
            "Arsenal Red": "#dd3333", "Manchester Blue": "#3366ff", "Bayern Black": "#222222",
            "Paris White": "#eeeeee", "Milan Stripe": "#cc0000", "Ajax Green": "#1e7e34",
            "Juventus Gold": "#e6b800", "Real White": "#f5f5f5"
        };
        return map[teamName] || "#88aa88";
    }
    
    teamSelect.addEventListener('change', updateTeamColors);
    
    // Physics & collision (simple)
    const PLAYER_RADIUS = 18;
    const BALL_RADIUS = 10;
    const GOAL_WIDTH = 100;
    const GOAL_Y_TOP = canvas.height/2 - GOAL_WIDTH/2;
    const GOAL_Y_BOTTOM = canvas.height/2 + GOAL_WIDTH/2;
    
    function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
    
    function handleCollisions() {
        // player boundaries
        gameState.p1.x = clamp(gameState.p1.x, PLAYER_RADIUS, canvas.width/2 - 30);
        gameState.p1.y = clamp(gameState.p1.y, PLAYER_RADIUS, canvas.height - PLAYER_RADIUS);
        gameState.p2.x = clamp(gameState.p2.x, canvas.width/2 + 30, canvas.width - PLAYER_RADIUS);
        gameState.p2.y = clamp(gameState.p2.y, PLAYER_RADIUS, canvas.height - PLAYER_RADIUS);
        
        // ball boundaries (except goals)
        if (gameState.ball.x - BALL_RADIUS < 0) { // left goal
            if (gameState.ball.y > GOAL_Y_TOP && gameState.ball.y < GOAL_Y_BOTTOM) {
                gameState.score.p2++;
                resetBall();
            } else { gameState.ball.x = BALL_RADIUS; gameState.ball.vx *= -0.5; }
        }
        if (gameState.ball.x + BALL_RADIUS > canvas.width) { // right goal
            if (gameState.ball.y > GOAL_Y_TOP && gameState.ball.y < GOAL_Y_BOTTOM) {
                gameState.score.p1++;
                resetBall();
            } else { gameState.ball.x = canvas.width - BALL_RADIUS; gameState.ball.vx *= -0.5; }
        }
        gameState.ball.y = clamp(gameState.ball.y, BALL_RADIUS, canvas.height - BALL_RADIUS);
        
        // player-ball collision (elastic)
        function collideWith(player) {
            const dx = gameState.ball.x - player.x;
            const dy = gameState.ball.y - player.y;
            const dist = Math.hypot(dx, dy);
            if (dist < PLAYER_RADIUS + BALL_RADIUS) {
                const angle = Math.atan2(dy, dx);
                const force = 8;
                gameState.ball.vx = Math.cos(angle) * force;
                gameState.ball.vy = Math.sin(angle) * force;
                // push ball outside
                const overlap = PLAYER_RADIUS + BALL_RADIUS - dist;
                gameState.ball.x += Math.cos(angle) * overlap;
                gameState.ball.y += Math.sin(angle) * overlap;
            }
        }
        collideWith(gameState.p1);
        collideWith(gameState.p2);
        
        // apply friction and movement
        gameState.ball.vx *= 0.98;
        gameState.ball.vy *= 0.98;
        gameState.ball.x += gameState.ball.vx;
        gameState.ball.y += gameState.ball.vy;
    }
    
    function resetBall() {
        gameState.ball = { x: canvas.width/2, y: canvas.height/2, vx: (Math.random() - 0.5)*2, vy: (Math.random() - 0.5)*2 };
        sendGameState();
    }
    
    // input movement & kick
    function applyLocalMovement() {
        if (localPlayerId === 'p1') {
            let move = { x: 0, y: 0 };
            if (keys.d) move.x += 5;
            if (keys.a) move.x -= 5;
            if (keys.s) move.y += 5;
            if (keys.w) move.y -= 5;
            gameState.p1.x += move.x;
            gameState.p1.y += move.y;
            if (keys.kickP1) {
                kickBallTowards(gameState.p1);
                keys.kickP1 = false;
            }
        } else if (localPlayerId === 'p2') {
            let move = { x: 0, y: 0 };
            if (keys.right) move.x += 5;
            if (keys.left) move.x -= 5;
            if (keys.down) move.y += 5;
            if (keys.up) move.y -= 5;
            gameState.p2.x += move.x;
            gameState.p2.y += move.y;
            if (keys.kickP2) {
                kickBallTowards(gameState.p2);
                keys.kickP2 = false;
            }
        }
    }
    
    function kickBallTowards(player) {
        const dx = gameState.ball.x - player.x;
        const dy = gameState.ball.y - player.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 50) {
            const angle = Math.atan2(dy, dx);
            gameState.ball.vx = Math.cos(angle) * 12;
            gameState.ball.vy = Math.sin(angle) * 12;
        }
    }
    
    // drawing
    function drawField() {
        ctx.fillStyle = "#2e7d32";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, 0);
        ctx.lineTo(canvas.width/2, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(canvas.width/2, canvas.height/2, 50, 0, Math.PI*2);
        ctx.stroke();
        // goals
        ctx.fillStyle = "#ffffcc88";
        ctx.fillRect(0, GOAL_Y_TOP, 10, GOAL_WIDTH);
        ctx.fillRect(canvas.width-10, GOAL_Y_TOP, 10, GOAL_WIDTH);
        ctx.fillStyle = "#ffd700";
        ctx.font = "bold 22px 'Segoe UI'";
        ctx.fillText("⚽", canvas.width/2-15, 40);
    }
    
    function drawPlayer(p, isLocal) {
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, PLAYER_RADIUS, 0, Math.PI*2);
        ctx.fillStyle = p.color;
        ctx.fill();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = "white";
        ctx.font = "bold 16px monospace";
        ctx.fillText(p.team.slice(0,2), p.x-12, p.y-12);
        if (isLocal) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
            ctx.fillStyle = "gold";
            ctx.fill();
        }
    }
    
    function draw() {
        drawField();
        drawPlayer(gameState.p1, localPlayerId === 'p1');
        drawPlayer(gameState.p2, localPlayerId === 'p2');
        ctx.beginPath();
        ctx.arc(gameState.ball.x, gameState.ball.y, BALL_RADIUS, 0, Math.PI*2);
        ctx.fillStyle = "white";
        ctx.fill();
        ctx.fillStyle = "black";
        ctx.font = "bold 24px monospace";
        ctx.fillText(`${gameState.score.p1}`, canvas.width/2-60, 70);
        ctx.fillText(`${gameState.score.p2}`, canvas.width/2+40, 70);
        scoreP1Span.innerText = gameState.score.p1;
        scoreP2Span.innerText = gameState.score.p2;
    }
    
    // ---------- NETWORKING + VOICE (PeerJS) ----------
    function sendGameState() {
        if (conn && conn.open) {
            conn.send({ type: "state", state: gameState });
        }
    }
    
    function onReceiveData(data) {
        if (data.type === "state") {
            // only update remote player and ball if we are not the one who moved local
            if (localPlayerId === 'p1') {
                gameState.p2 = data.state.p2;
                gameState.ball = data.state.ball;
                gameState.score = data.state.score;
            } else if (localPlayerId === 'p2') {
                gameState.p1 = data.state.p1;
                gameState.ball = data.state.ball;
                gameState.score = data.state.score;
            }
        }
    }
    
    async function startVoice(peerConnection) {
        if (voiceCall) return;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            voiceCall = peerConnection.call(conn.peer, localStream);
            voiceCall.on('stream', (remoteStream) => {
                remoteAudio = new Audio();
                remoteAudio.srcObject = remoteStream;
                remoteAudio.play();
            });
            isVoiceActive = true;
            voiceBtn.disabled = false;
            voiceBtn.innerText = "🎤 Voice ON";
            muteBtn.disabled = false;
        } catch(e) { console.error("Mic error", e); }
    }
    
    function muteMicrophone() {
        if (localStream) {
            localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled;
            muteBtn.innerText = localStream.getAudioTracks()[0].enabled ? "🔇 Mute Mic" : "🎤 Unmute";
        }
    }
    
    // Game loop & sync
    let lastSend = 0;
    function updateAndRender() {
        if (conn && conn.open) {
            applyLocalMovement();
            handleCollisions();
            if (Date.now() - lastSend > 33) { // ~30 fps sync
                sendGameState();
                lastSend = Date.now();
            }
        } else {
            // offline single player test move
            applyLocalMovement();
            handleCollisions();
        }
        draw();
        requestAnimationFrame(updateAndRender);
    }
    
    // ---- PEER INIT ----
    function createGame() {
        if (peer) peer.destroy();
        peer = new Peer();
        peer.on('open', (id) => {
            statusDiv.innerText = `🟢 Host ID: ${id}`;
            linkArea.innerHTML = `🔗 Share this link with a friend:<br> 
            <a href="${window.location.href}?join=${id}" target="_blank">${window.location.href}?join=${id}</a>`;
            peer.on('connection', (incomingConn) => {
                conn = incomingConn;
                setupConnection(conn, 'p1');
            });
        });
    }
    
    function joinGame(hostId) {
        if (peer) peer.destroy();
        peer = new Peer();
        peer.on('open', () => {
            const newConn = peer.connect(hostId);
            setupConnection(newConn, 'p2');
        });
    }
    
    function setupConnection(connection, assignedRole) {
        conn = connection;
        localPlayerId = assignedRole;
        if (assignedRole === 'p1') {
            gameState.p1.team = teamSelect.value;
            gameState.p1.color = getTeamColor(teamSelect.value);
        } else {
            gameState.p2.team = teamSelect.value;
            gameState.p2.color = getTeamColor(teamSelect.value);
            teamSelect.disabled = false; 
        }
        conn.on('open', () => {
            statusDiv.innerText = `✅ Connected as ${assignedRole.toUpperCase()}`;
            voiceBtn.disabled = false;
            // auto attempt voice after connection
            startVoice(peer);
            sendGameState();
        });
        conn.on('data', onReceiveData);
        conn.on('close', () => { statusDiv.innerText = "❌ Disconnected"; voiceBtn.disabled=true; });
    }
    
    // ---- KEYBOARD HANDLERS ----
    window.addEventListener('keydown', (e) => {
        const key = e.key;
        if (key === 'w') keys.w = true;
        if (key === 's') keys.s = true;
        if (key === 'a') keys.a = true;
        if (key === 'd') keys.d = true;
        if (key === 'f') keys.kickP1 = true;
        if (key === 'ArrowUp') keys.up = true;
        if (key === 'ArrowDown') keys.down = true;
        if (key === 'ArrowLeft') keys.left = true;
        if (key === 'ArrowRight') keys.right = true;
        if (key === 'm') keys.kickP2 = true;
        e.preventDefault();
    });
    window.addEventListener('keyup', (e) => {
        const key = e.key;
        if (key === 'w') keys.w = false;
        if (key === 's') keys.s = false;
        if (key === 'a') keys.a = false;
        if (key === 'd') keys.d = false;
        if (key === 'ArrowUp') keys.up = false;
        if (key === 'ArrowDown') keys.down = false;
        if (key === 'ArrowLeft') keys.left = false;
        if (key === 'ArrowRight') keys.right = false;
        e.preventDefault();
    });
    
    createBtn.addEventListener('click', createGame);
    voiceBtn.addEventListener('click', () => { if (!voiceCall && conn) startVoice(peer); });
    muteBtn.addEventListener('click', muteMicrophone);
    
    // Check URL for join param
    const urlParams = new URLSearchParams(window.location.search);
    const joinId = urlParams.get('join');
    if (joinId) {
        setTimeout(() => joinGame(joinId), 500);
    } else {
        // default: wait for host creation
    }
    
    updateTeamColors();
    updateAndRender();
</script>
</body>
</html>
